<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RealSim RL Lab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Simulation workspace">
        <header class="topbar">
          <div>
            <h1>RealSim RL Lab</h1>
            <p id="scenarioSubtitle">Warehouse Delivery Starter</p>
          </div>
          <div class="status-strip">
            <span id="runState" class="status-pill">Stopped</span>
            <span id="goalState" class="status-pill success">0/1 Arrived</span>
          </div>
        </header>

        <div class="canvas-frame">
          <canvas id="worldCanvas" aria-label="Scenario map"></canvas>
          <div class="canvas-legend" aria-label="Map legend">
            <span><i class="legend robot"></i> Robot</span>
            <span><i class="legend target"></i> Target</span>
            <span><i class="legend shelf"></i> Shelf</span>
            <span><i class="legend zone"></i> Zone</span>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Simulation controls">
        <nav class="tabs" aria-label="Panel tabs">
          <button class="tab active" data-tab="run">Run</button>
          <button class="tab" data-tab="build">Build</button>
          <button class="tab" data-tab="scenario">JSON</button>
        </nav>

        <section id="runPanel" class="panel-section active">
          <div class="toolbar">
            <button id="playPauseBtn" class="icon-button primary" title="Start or pause" aria-label="Start or pause">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
              <span>Start</span>
            </button>
            <button id="stepBtn" class="icon-button" title="Step" aria-label="Step">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5v14l8-7zM15 5h3v14h-3z"></path></svg>
              <span>Step</span>
            </button>
            <button id="resetBtn" class="icon-button" title="Reset episode" aria-label="Reset episode">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h7a5 5 0 1 1-4.6 7h-3.2A8 8 0 1 0 14 4H7V1L2 5.5 7 10z"></path></svg>
              <span>Reset</span>
            </button>
            <button id="episodeBtn" class="icon-button" title="Run episode" aria-label="Run episode">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h4l2 5 2-10 3 15 2-5h3v3h-1l-3.5 7-2.8-14-2.2 11-4-9H4z"></path></svg>
              <span>Episode</span>
            </button>
          </div>

          <div class="metric-grid">
            <div class="metric"><span>Episode</span><strong id="episodeMetric">0</strong></div>
            <div class="metric"><span>Step</span><strong id="stepMetric">0</strong></div>
            <div class="metric"><span>Reward</span><strong id="rewardMetric">0.0</strong></div>
            <div class="metric"><span>Best</span><strong id="bestMetric">0.0</strong></div>
            <div class="metric"><span>Explore</span><strong id="exploreMetric">100%</strong></div>
            <div class="metric"><span>States</span><strong id="statesMetric">0</strong></div>
            <div class="metric"><span>Distance</span><strong id="distanceMetric">0.0</strong></div>
            <div class="metric"><span>Contacts</span><strong id="collisionMetric">0</strong></div>
          </div>

          <label class="toggle-row">
            <span>Q-learning</span>
            <input id="trainingToggle" type="checkbox" checked>
          </label>

          <label class="range-row">
            <span>Steps/frame</span>
            <output id="speedValue">4</output>
            <input id="speedSlider" type="range" min="1" max="16" value="4">
          </label>

          <label class="range-row">
            <span>Sensor rays</span>
            <output id="rayValue">16</output>
            <input id="raySlider" type="range" min="4" max="32" value="16" step="2">
          </label>

          <canvas id="rewardChart" class="reward-chart" width="640" height="220" aria-label="Reward chart"></canvas>
        </section>

        <section id="buildPanel" class="panel-section">
          <div class="segmented" role="group" aria-label="Edit mode">
            <button class="mode-button active" data-mode="select">Select</button>
            <button class="mode-button" data-mode="shelf">Shelf</button>
            <button class="mode-button" data-mode="zone">Zone</button>
            <button class="mode-button" data-mode="robot">Robot</button>
            <button class="mode-button" data-mode="target">Target</button>
          </div>

          <div class="property-grid">
            <label>Name<input id="propName" type="text"></label>
            <label>Kind<input id="propKind" type="text"></label>
            <label>X<input id="propX" type="number" step="0.5"></label>
            <label>Y<input id="propY" type="number" step="0.5"></label>
            <label>Width<input id="propW" type="number" step="0.5"></label>
            <label>Height<input id="propH" type="number" step="0.5"></label>
          </div>

          <div class="toolbar compact">
            <button id="applyPropsBtn" class="icon-button primary" title="Apply" aria-label="Apply">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.2 4.8 12l-2 2L9 20 22 7l-2-2z"></path></svg>
              <span>Apply</span>
            </button>
            <button id="deleteSelectedBtn" class="icon-button danger" title="Delete" aria-label="Delete">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12l-1 14H7zM9 4h6l1 2H8zM5 6h14v2H5z"></path></svg>
              <span>Delete</span>
            </button>
          </div>

          <div class="object-list" id="objectList" aria-label="Scenario objects"></div>
        </section>

        <section id="scenarioPanel" class="panel-section">
          <div class="property-grid">
            <label>Scenario<input id="scenarioName" type="text"></label>
            <label>World W<input id="worldW" type="number" step="1"></label>
            <label>World H<input id="worldH" type="number" step="1"></label>
          </div>
          <textarea id="scenarioJson" spellcheck="false" aria-label="Scenario JSON"></textarea>
          <div class="toolbar compact">
            <button id="loadJsonBtn" class="icon-button primary" title="Load JSON" aria-label="Load JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12l4-4 2 2-6 6-6-6 2-2 4 4V3z"></path></svg>
              <span>Load</span>
            </button>
            <button id="downloadJsonBtn" class="icon-button" title="Download JSON" aria-label="Download JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20h14v-2H5zM12 3v10l4-4 2 2-6 6-6-6 2-2 4 4V3z"></path></svg>
              <span>Save</span>
            </button>
            <button id="copyJsonBtn" class="icon-button" title="Copy JSON" aria-label="Copy JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h11v13H8zM5 3h11v3H8a2 2 0 0 0-2 2v10H5z"></path></svg>
              <span>Copy</span>
            </button>
          </div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
